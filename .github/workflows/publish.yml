name: Publish Artifacts

on:
  push:
    branches:
      - develop
      - main
    tags:
      - 'v*'

env:
  REGISTRY: public.ecr.aws/i0h0h0n4/xyn/artifacts
  UI_IMAGE: public.ecr.aws/i0h0h0n4/xyn/artifacts/xyn-ui
  API_IMAGE: public.ecr.aws/i0h0h0n4/xyn/artifacts/xyn-api
  NET_INVENTORY_IMAGE: public.ecr.aws/i0h0h0n4/xyn/artifacts/net-inventory-api
  AWS_ROLE_TO_ASSUME: ${{ secrets.AWS_ROLE_TO_ASSUME }}
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate AWS publish credentials
        shell: bash
        run: |
          if [[ -n "${AWS_ROLE_TO_ASSUME}" ]]; then
            echo "Using OIDC role assumption."
            exit 0
          fi
          if [[ -n "${AWS_ACCESS_KEY_ID}" && -n "${AWS_SECRET_ACCESS_KEY}" ]]; then
            echo "Using static AWS access keys from repo secrets."
            exit 0
          fi
          echo "Missing AWS credentials for publish workflow."
          echo "Set either:"
          echo "  - AWS_ROLE_TO_ASSUME (OIDC, recommended), or"
          echo "  - AWS_ACCESS_KEY_ID + AWS_SECRET_ACCESS_KEY"
          exit 1

      - name: Configure AWS credentials (OIDC role)
        if: ${{ env.AWS_ROLE_TO_ASSUME != '' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME }}
          aws-region: us-east-1

      - name: Configure AWS credentials (access keys)
        if: ${{ env.AWS_ROLE_TO_ASSUME == '' && env.AWS_ACCESS_KEY_ID != '' && env.AWS_SECRET_ACCESS_KEY != '' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ env.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ env.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to ECR Public
        run: aws ecr-public get-login-password --region us-east-1 | docker login --username AWS --password-stdin public.ecr.aws

      - name: Compute tags
        id: vars
        shell: bash
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "sha_tag=${SHORT_SHA}" >> "$GITHUB_OUTPUT"

          BRANCH_TAG=""
          COMPAT_TAG=""
          if [[ "${GITHUB_REF}" == "refs/heads/develop" ]]; then
            BRANCH_TAG="develop"
            # Temporary compatibility alias for existing consumers.
            COMPAT_TAG="dev"
          elif [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
            BRANCH_TAG="main"
          fi
          echo "branch_tag=${BRANCH_TAG}" >> "$GITHUB_OUTPUT"
          echo "compat_tag=${COMPAT_TAG}" >> "$GITHUB_OUTPUT"

          UI_TAGS="${UI_IMAGE}:${SHORT_SHA}"
          API_TAGS="${API_IMAGE}:${SHORT_SHA}"
          NET_TAGS="${NET_INVENTORY_IMAGE}:${SHORT_SHA}"
          if [[ -n "${BRANCH_TAG}" ]]; then
            UI_TAGS="${UI_TAGS}"$'\n'"${UI_IMAGE}:${BRANCH_TAG}"
            API_TAGS="${API_TAGS}"$'\n'"${API_IMAGE}:${BRANCH_TAG}"
            NET_TAGS="${NET_TAGS}"$'\n'"${NET_INVENTORY_IMAGE}:${BRANCH_TAG}"
          fi
          if [[ -n "${COMPAT_TAG}" ]]; then
            UI_TAGS="${UI_TAGS}"$'\n'"${UI_IMAGE}:${COMPAT_TAG}"
            API_TAGS="${API_TAGS}"$'\n'"${API_IMAGE}:${COMPAT_TAG}"
            NET_TAGS="${NET_TAGS}"$'\n'"${NET_INVENTORY_IMAGE}:${COMPAT_TAG}"
          fi
          {
            echo "ui_tags<<EOF"
            echo "${UI_TAGS}"
            echo "EOF"
            echo "api_tags<<EOF"
            echo "${API_TAGS}"
            echo "EOF"
            echo "net_inventory_tags<<EOF"
            echo "${NET_TAGS}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "version_tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push xyn-ui (sha + branch)
        uses: docker/build-push-action@v6
        with:
          context: apps/xyn-ui
          file: apps/xyn-ui/Dockerfile
          push: true
          tags: ${{ steps.vars.outputs.ui_tags }}

      - name: Build and push xyn-api (sha + branch)
        uses: docker/build-push-action@v6
        with:
          context: services/xyn-api
          file: services/xyn-api/Dockerfile
          push: true
          tags: ${{ steps.vars.outputs.api_tags }}

      - name: Build and push net-inventory-api (sha + branch)
        uses: docker/build-push-action@v6
        with:
          context: services/net-inventory-api
          file: services/net-inventory-api/Dockerfile
          push: true
          tags: ${{ steps.vars.outputs.net_inventory_tags }}

      - name: Build and push xyn-ui (version + stable)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: docker/build-push-action@v6
        with:
          context: apps/xyn-ui
          file: apps/xyn-ui/Dockerfile
          push: true
          tags: |
            ${{ env.UI_IMAGE }}:${{ steps.vars.outputs.version_tag }}
            ${{ env.UI_IMAGE }}:stable

      - name: Build and push xyn-api (version + stable)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: docker/build-push-action@v6
        with:
          context: services/xyn-api
          file: services/xyn-api/Dockerfile
          push: true
          tags: |
            ${{ env.API_IMAGE }}:${{ steps.vars.outputs.version_tag }}
            ${{ env.API_IMAGE }}:stable

      - name: Build and push net-inventory-api (version + stable)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: docker/build-push-action@v6
        with:
          context: services/net-inventory-api
          file: services/net-inventory-api/Dockerfile
          push: true
          tags: |
            ${{ env.NET_INVENTORY_IMAGE }}:${{ steps.vars.outputs.version_tag }}
            ${{ env.NET_INVENTORY_IMAGE }}:stable

      - name: Generate release bridge manifest
        shell: bash
        run: |
          mkdir -p releases
          cat > releases/dev.json <<JSON
          {
            "channel": "dev",
            "published_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "images": {
              "xyn-ui": "${UI_IMAGE}:${{ steps.vars.outputs.sha_tag }}",
              "xyn-api": "${API_IMAGE}:${{ steps.vars.outputs.sha_tag }}",
              "net-inventory-api": "${NET_INVENTORY_IMAGE}:${{ steps.vars.outputs.sha_tag }}"
            }
          }
          JSON

      - name: Upload release bridge manifest
        uses: actions/upload-artifact@v4
        with:
          name: releases-dev
          path: releases/dev.json
