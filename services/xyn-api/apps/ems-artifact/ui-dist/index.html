<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EMS</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="page">
      <header class="page-header">
        <h1>EMS</h1>
        <p>Assets demo app</p>
        <nav>
          <a href="/apps/ems">Assets</a>
          <a href="/apps/ems/manage">Settings</a>
          <a href="/apps/ems/docs">Docs</a>
          <a href="/apps/ems/docs/demo">Demo Script</a>
        </nav>
      </header>

      <section class="card">
        <h2>Create Asset</h2>
        <form id="asset-form">
          <label>Name <input name="name" required /></label>
          <label>Type <input name="type" required /></label>
          <label>Location <input name="location" required /></label>
          <label>Status <input name="status" placeholder="active" /></label>
          <button type="submit">Create</button>
        </form>
      </section>

      <section class="card">
        <h2>Assets</h2>
        <button id="refresh" type="button">Refresh</button>
        <pre id="error" class="error" hidden></pre>
        <table>
          <thead>
            <tr>
              <th>Name</th>
              <th>Type</th>
              <th>Location</th>
              <th>Status</th>
              <th>Created</th>
            </tr>
          </thead>
          <tbody id="assets-body"></tbody>
        </table>
      </section>
    </main>
    <script src="./main.js"></script>
  </body>
</html>
